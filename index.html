<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f3e17" />

    <title>ColorMind — Interactive Design System Generator</title>
    <meta name="description" content="Generate, preview, and export complete design systems in seconds. Color palettes, typography scales, spacing, and Tailwind CSS config — all in one tool." />
    <meta name="keywords" content="design system generator, color palette tool, tailwind css config, typography scale, UI design tool, color harmony, design tokens" />
    <meta name="author" content="Fahril Shaputra" />
    <link rel="canonical" href="https://colormind.web.id" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://colormind.web.id" />
    <meta property="og:title" content="ColorMind — Interactive Design System Generator" />
    <meta property="og:description" content="Generate, preview, and export complete design systems in seconds. Color palettes, typography scales, spacing, and Tailwind CSS config." />
    <meta property="og:image" content="https://colormind.web.id/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ColorMind" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ColorMind — Interactive Design System Generator" />
    <meta name="twitter:description" content="Generate, preview, and export complete design systems in seconds. Color palettes, typography scales, spacing, and Tailwind CSS config." />
    <meta name="twitter:image" content="https://colormind.web.id/og-image.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ColorMind",
        "url": "https://colormind.web.id",
        "description": "Interactive design system generator. Create color palettes, typography scales, spacing systems, and export Tailwind CSS config.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Web",
        "author": {
          "@type": "Person",
          "name": "Fahril Shaputra"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Color palette generation with harmony modes",
          "Typography scale calculator",
          "Spacing and border radius system",
          "Tailwind CSS config export",
          "Live preview with website, card, and poster templates",
          "Colorblind accessibility testing",
          "Export as PNG or shareable URL"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => {
            console.error('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
